openapi: 3.0.0
info:
  title: Subscription hub API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Локальный сервер

security:
  - BearerAuth: []
  - TenantID: []

tags:
  - name: Аутентификация
    description: Регистрация и вход в систему

  - name: Профиль
    description: Управление собственным профилем

paths:

  # =============== Аутентификация ===============

  /auth/signup:
    post:
      tags:
        - Аутентификация
      summary: Регистрация нового пользователя
      operationId: SignUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Ошибка валидации"
                details:
                  field_name: "Некорректное значение"
        '409':
          description: Пользователь с таким email уже зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Пользователь с таким email уже зарегистрирован"

  /auth/signin:
    post:
      tags:
        - Аутентификация
      summary: Вход в систему
      operationId: SignIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Ошибка валидации"
                details:
                  field_name: "Некорректное значение"
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Неверный email или пароль"

  # =============== Профиль ===============

  /profile:
    get:
      tags:
        - Профиль
      summary: Получить профиль текущего пользователя
      operationId: GetCurrentProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешное получение профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Пользователь не авторизован или токен недействителен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Требуется авторизация"

    patch:
      tags:
        - Профиль
      summary: Обновить свой профиль
      operationId: UpdateCurrentProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Профиль успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Ошибка валидации"
                details:
                  field_name: "Некорректное значение"
        '401':
          description: Пользователь не авторизован или токен недействителен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Требуется авторизация"

    delete:
      tags:
        - Профиль
      summary: Удалить свой профиль
      operationId: DeleteCurrentProfile
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Профиль успешно удалён
        '401':
          description: Пользователь не авторизован или токен недействителен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Требуется авторизация"
        '409':
          description: Невозможно удалить профиль владельца организации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Ошибка удаления"
                details:
                  base: "Невозможно удалить профиль владельца организации"

  /profile/full:
    get:
      tags:
        - Профиль
      summary: Получить полный профиль с компаниями и ролями
      operationId: GetFullCurrentProfile
      security:
        - BearerAuth: [ ]
      parameters:
        - name: tenants_limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Количество компаний в списке
        - name: tenants_offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Смещение для пагинации компаний
      responses:
        '200':
          description: Успешное получение профиля с компаниями
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullProfileResponse'
        '401':
          description: Пользователь не авторизован или токен недействителен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Требуется авторизация"

# =============== КОМПОНЕНТЫ API ===============

components:

  # =============== СХЕМЫ БЕЗОПАСНОСТИ ===============

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT токен пользователя"

    TenantID:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: "Идентификатор компании для выполнения операций в её контексте"

  # =============== СХЕМЫ ДАННЫХ ===============

  schemas:

    # Общие

    ErrorResponse:
      type: object
      description: "Универсальный формат ответа при возникновении ошибок (4xx, 5xx)"
      required:
        - error
      properties:
        error:
          type: string
          x-order: 1
          description: "Описание ошибки"
        details:
          type: object
          x-order: 2
          description: "Дополнительные детали (если присутствуют)"
          additionalProperties:
            type: string

    PaginationMeta:
      type: object
      description: "Метаданные пагинации для списков (коллекций)"
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          x-order: 1
          description: "Сколько записей запрошено"
          example: 10
        offset:
          type: integer
          x-order: 2
          description: "С какой позиции начат отсчет"
          example: 0
        total:
          type: integer
          format: int64
          x-order: 3
          description: "Общее количество записей в базе"
          example: 100

    #  Пользователь

    UserResponse:
      type: object
      description: "Базовая информация о пользователе системы"
      required:
        - id
        - email
        - first_name
        - last_name
        - created_at
      properties:
        id:
          type: integer
          format: int64
          x-go-name: ID
          x-order: 1
          description: "Уникальный идентификатор пользователя"
          example: 1
        email:
          type: string
          format: email
          x-order: 2
          description: "Адрес электронной почты (логин)"
          example: "name@mail.ru"
        first_name:
          type: string
          x-order: 3
          description: "Имя пользователя"
          example: "firstname"
        last_name:
          type: string
          description: "Фамилия пользователя"
          x-order: 4
          example: "lastname"
        created_at:
          type: string
          format: date-time
          x-order: 5
          description: "Дата и время регистрации пользователя в системе"
          example: "2024-01-01T12:00:00Z"

    #  Аутентификация

    SignUpRequest:
      type: object
      description: "Данные для регистрации нового пользователя"
      required:
        - email
        - first_name
        - last_name
        - password
      properties:
        email:
          type: string
          format: email
          x-order: 1
          description: "Адрес электронной почты (логин)"
          example: "name@mail.ru"
        first_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 2
          description: "Имя пользователя"
          example: "firstname"
        last_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 3
          description: "Фамилия пользователя"
          example: "lastname"
        password:
          type: string
          format: password
          minLength: 8
          x-order: 4
          example: "12345678"

    SignInRequest:
      type: object
      description: "Учетные данные для входа в систему"
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          x-order: 1
          description: "Адрес электронной почты (логин), указанный при регистрации"
          example: "name@mail.ru"
        password:
          type: string
          format: password
          x-order: 2
          description: "Текущий пароль пользователя"
          example: "12345678"

    SignInResponse:
      type: object
      description: "Результат успешной аутентификации"
      required:
        - access_token
        - user
      properties:
        access_token:
          type: string
          x-order: 1
          description: "JWT-токен для доступа к защищенным ресурсам"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          x-order: 2
          allOf:
            - $ref: '#/components/schemas/UserResponse'

    # Профиль

    FullProfileResponse:
      allOf:
        - $ref: '#/components/schemas/UserResponse'
        - type: object
          description: "Расширенный профиль пользователя"
          required:
            - tenants
          properties:
            tenants:
              type: object
              x-order: 6
              description: "Список компаний пользователя с метаданными пагинации"
              required:
                - items
                - pagination
              properties:
                items:
                  type: array
                  x-order: 1
                  items:
                    $ref: '#/components/schemas/MemberTenantResponse'
                pagination:
                  x-order: 2
                  allOf:
                    - $ref: '#/components/schemas/PaginationMeta'

    UpdateProfileRequest:
      type: object
      description: "Данные для частичного обновления профиля текущего пользователя"
      properties:
        first_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 1
          description: "Новое имя пользователя"
          example: "firstname"
        last_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 2
          description: "Новая фамилия пользователя"
          example: "lastname"

    # Связи пользователей с компаниями

    MemberTenantResponse:
      type: object
      description: "Данные о членстве пользователя в компании"
      required:
        - tenant_id
        - tenant_name
        - role
      properties:
        tenant_id:
          type: integer
          format: int64
          x-go-name: TenantID
          x-order: 1
          description: "Уникальный идентификатор компании"
          example: 1
        tenant_name:
          type: string
          x-order: 2
          description: "Название компании"
          example: "tenantname"
        role:
          type: string
          enum:
            - owner
            - admin
            - manager
            - viewer
          x-order: 3
          description: "Роль текущего пользователя в этой компании"
          example: "admin"