signup:
  post:
    tags:
      - Аутентификация
    summary: Зарегистрировать нового пользователя
    operationId: SignUp
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/components/schemas/SignUpRequest'
    responses:
      '201':
        description: Пользователь успешно зарегистрирован
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/components/schemas/UserResponse'
      '400':
        description: Ошибка обработки запроса
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка обработки запроса
      '409':
        description: Пользователь с таким email уже зарегистрирован
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Пользователь с таким email уже зарегистрирован
      '422':
        description: Ошибка валидации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка валидации
              details:
                path: некорректные данные
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера


signin:
  post:
    tags:
      - Аутентификация
    summary: Войти в систему
    operationId: SignIn
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/components/schemas/SignInRequest'
    responses:
      '200':
        description: Вход выполнен успешно
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/components/schemas/SignInResponse'
      '400':
        description: Ошибка обработки запроса
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка обработки запроса
      '401':
        description: Неверный email или пароль
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Неверный email или пароль
      '422':
        description: Ошибка валидации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка валидации
              details:
                path: некорректные данные
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера