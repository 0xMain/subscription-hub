tenants:
  get:
    tags:
      - Компании
    summary: Получить список компаний
    operationId: GetTenantList
    security:
      - BearerAuth: []
    parameters:
      - name: name
        in: query
        schema:
          $ref: '../schemas/common.yaml#/components/schemas/SearchQuery'
        description: Название компании для поиска
      - name: limit
        in: query
        schema:
          $ref: '../schemas/common.yaml#/components/schemas/PaginationLimit'
        description: Количество компаний на одной странице
      - name: offset
        in: query
        schema:
          $ref: '../schemas/common.yaml#/components/schemas/PaginationOffset'
        description: Смещение в списке компаний
    responses:
      '200':
        description: Список компаний успешно получен
        content:
          application/json:
            schema:
              $ref: '../schemas/tenant.yaml#/components/schemas/TenantListResponse'
      '400':
        description: Ошибка обработки запроса
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка обработки запроса
      '401':
        description: Требуется авторизация
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Требуется авторизация
      '422':
        description: Ошибка валидации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка валидации
              details:
                path: некорректные данные
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера

  post:
    tags:
      - Компании
    summary: Создать компанию
    operationId: CreateTenant
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/tenant.yaml#/components/schemas/CreateTenantRequest'
    responses:
      '201':
        description: Компания успешно создана
        content:
          application/json:
            schema:
              $ref: '../schemas/tenant.yaml#/components/schemas/TenantResponse'
      '400':
        description: Ошибка обработки запроса
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка обработки запроса
      '401':
        description: Требуется авторизация
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Требуется авторизация
      '409':
        description: Компания с таким названием уже существует
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Компания с таким названием уже существует
      '422':
        description: Ошибка валидации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка валидации
              details:
                path: некорректные данные
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера


