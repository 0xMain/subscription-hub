profile:
  get:
    tags:
      - Профиль
    summary: Получить данные текущего профиля
    operationId: GetCurrentProfile
    security:
      - BearerAuth: []
    responses:
      '200':
        description: Данные профиля успешно получены
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/components/schemas/UserResponse'
      '401':
        description: Требуется авторизация
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Требуется авторизация
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера

  patch:
    tags:
      - Профиль
    summary: Обновить данные текущего профиля
    operationId: UpdateCurrentProfile
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/profile.yaml#/components/schemas/UpdateProfileRequest'
    responses:
      '200':
        description: Данные профиля успешно обновлены
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/components/schemas/UserResponse'
      '400':
        description: Ошибка обработки запроса
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка обработки запроса
      '401':
        description: Требуется авторизация
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Требуется авторизация
      '422':
        description: Ошибка валидации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка валидации
              details:
                path: некорректные данные
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера

  delete:
    tags:
      - Профиль
    summary: Удалить текущий профиль
    operationId: DeleteCurrentProfile
    security:
      - BearerAuth: []
    responses:
      '204':
        description: Профиль успешно удален
      '401':
        description: Требуется авторизация
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Требуется авторизация
      '409':
        description: Невозможно удалить профиль владельца организации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка удаления
              details:
                base: невозможно удалить профиль владельца организации
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера


profile_full:
  get:
    tags:
      - Профиль
    summary: Получить полные данные текущего профиля
    operationId: GetFullCurrentProfile
    security:
      - BearerAuth: []
    parameters:
      - name: tenants_limit
        in: query
        schema:
          $ref: '../schemas/common.yaml#/components/schemas/PaginationLimit'
        description: Количество компаний в списке
      - name: tenants_offset
        in: query
        schema:
          $ref: '../schemas/common.yaml#/components/schemas/PaginationOffset'
        description: Смещение для пагинации компаний
    responses:
      '200':
        description: Полные данные профиля успешно получены
        content:
          application/json:
            schema:
              $ref: '../schemas/profile.yaml#/components/schemas/FullProfileResponse'
      '400':
        description: Ошибка обработки запроса
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка обработки запроса
      '401':
        description: Требуется авторизация
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Требуется авторизация
      '422':
        description: Ошибка валидации
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Ошибка валидации
              details:
                path: некорректные данные
      '500':
        description: Внутренняя ошибка сервера
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
            example:
              error: Внутренняя ошибка сервера