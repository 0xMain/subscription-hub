components:
  schemas:

    ErrorResponse:
      type: object
      description: Универсальный формат ответа при возникновении ошибок (4xx, 5xx)
      required:
        - error
      properties:
        error:
          type: string
          x-order: 1
          description: Описание ошибки
        details:
          type: object
          x-order: 2
          description: Дополнительные детали (если присутствуют)
          additionalProperties:
            type: array
            items:
              type: string

    PaginationMeta:
      type: object
      description: Метаданные пагинации для списков (коллекций)
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          x-order: 1
          description: Сколько записей запрошено
          example: 10
        offset:
          type: integer
          x-order: 2
          description: С какой позиции начат отсчет
          example: 0
        total:
          type: integer
          format: int64
          x-order: 3
          description: Общее количество записей в базе
          example: 100

    PaginationLimit:
      type: integer
      default: 10
      minimum: 1
      maximum: 100
      description: Максимальное количество элементов на одной странице

    PaginationOffset:
      type: integer
      default: 0
      minimum: 0
      description: Смещение от начала списка

    SearchQuery:
      type: string
      minLength: 2
      maxLength: 255
      description: Строка для поиска по текстовым полям