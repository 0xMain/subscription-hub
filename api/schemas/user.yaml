components:
  schemas:

    UserResponse:
      type: object
      description: Базовая информация о пользователе системы
      required:
        - id
        - email
        - first_name
        - last_name
        - created_at
      properties:
        id:
          type: integer
          format: int64
          x-go-name: ID
          x-order: 1
          description: Уникальный идентификатор пользователя
          example: 1
        email:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          x-order: 2
          description: Адрес электронной почты (логин)
          example: user@example.com
        first_name:
          type: string
          x-order: 3
          description: Имя пользователя
          example: Иван
        last_name:
          type: string
          x-order: 4
          description: Фамилия пользователя
          example: Иванов
        created_at:
          type: string
          format: date-time
          x-order: 5
          description: Дата и время регистрации пользователя в системе
          example: "2026-01-01T12:00:00Z"