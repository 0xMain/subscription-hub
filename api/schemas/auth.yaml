components:
  schemas:

    SignUpRequest:
      type: object
      description: Данные для регистрации нового пользователя
      required:
        - email
        - first_name
        - last_name
        - password
      properties:
        email:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          x-order: 1
          description: Адрес электронной почты (логин)
          example: ivan.ivanov@example.com
        first_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 2
          description: Имя пользователя
          example: Иван
        last_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 3
          description: Фамилия пользователя
          example: Иванов
        password:
          type: string
          format: password
          minLength: 8
          x-order: 4
          description: Пароль (минимум 8 символов)
          example: "********"

    SignInRequest:
      type: object
      description: Учетные данные для входа в систему
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          x-order: 1
          description: Адрес электронной почты (логин), указанный при регистрации
          example: ivan.ivanov@example.com
        password:
          type: string
          format: password
          x-order: 2
          description: Пароль
          example: "********"

    SignInResponse:
      type: object
      description: Результат успешной аутентификации
      required:
        - access_token
        - user
      properties:
        access_token:
          type: string
          x-order: 1
          description: JWT-токен для доступа к защищенным ресурсам
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzUwNjI3ODIsImlhdCI6MTc3NDk3NjM4Miwic3ViIjoiMSJ9._Wo5e-U10kMi29_ME9lV3hBy_xawlWDwKEnbjolq5OI
        user:
          allOf:
            - $ref: './user.yaml#/components/schemas/UserResponse'
          x-order: 2