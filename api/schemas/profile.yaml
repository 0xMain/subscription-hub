components:
  schemas:

    FullProfileResponse:
      allOf:
        - $ref: './user.yaml#/components/schemas/UserResponse'
        - type: object
          description: Расширенный профиль пользователя
          required:
            - tenants
          properties:
            tenants:
              type: object
              x-order: 6
              description: Список компаний, в которых состоит пользователь, с метаданными пагинации
              required:
                - items
                - pagination
              properties:
                items:
                  type: array
                  x-order: 1
                  items:
                    $ref: '#/components/schemas/MemberTenantResponse'
                pagination:
                  allOf:
                    - $ref: './common.yaml#/components/schemas/PaginationMeta'
                  x-order: 2

    UpdateProfileRequest:
      type: object
      description: Данные для частичного обновления профиля текущего пользователя
      properties:
        first_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 1
          description: Новое имя пользователя
          example: Иван
        last_name:
          type: string
          minLength: 2
          maxLength: 100
          x-order: 2
          description: Новая фамилия пользователя
          example: Петров

    MemberTenantResponse:
      type: object
      description: Данные о членстве пользователя в компании
      required:
        - tenant
        - role
      properties:
        tenant:
          allOf:
            - $ref: './tenant.yaml#/components/schemas/TenantResponse'
          x-order: 1
        role:
          type: string
          enum:
            - owner
            - admin
            - manager
            - viewer
          x-order: 2
          description: Роль текущего пользователя в этой компании
          example: admin