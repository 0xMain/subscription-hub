services:
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: subscription-hub-swagger-ui
    ports:
      - "${SWAGGER_PORT:-8081}:8080"
    environment:
      - SWAGGER_JSON=${SWAGGER_SPEC_PATH:-/spec/spec.yaml}
    volumes:
      - ${SWAGGER_LOCAL_DIR:-./api}:/spec


  adminer:
    image: adminer:latest
    container_name: subscription-hub-postgres-admin
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=${POSTGRES_HOST:-postgres}
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: subscription-hub-redis-admin
    platform: linux/amd64
    ports:
      - "${REDIS_COMMANDER_PORT:-8083}:8081"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_INTERNAL_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-admin}
      - REDIS_DB=${REDIS_DB_INDEX:-0}
    depends_on:
      - redis


  postgres:
    image: postgres:alpine
    container_name: subscription-hub-postgres-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - POSTGRES_DB=${POSTGRES_DB:-subscription_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${POSTGRES_INIT_SQL:-./migrations/main/001_init.sql}:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    container_name: subscription-hub-redis-cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-admin}
      - REDIS_MAXMEM=${REDIS_MAXMEM:-128mb}
    command: >
      sh -c "redis-server 
      --requirepass $$REDIS_PASSWORD 
      --maxmemory $$REDIS_MAXMEM 
      --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data:/data


  vault:
    image: hashicorp/vault:latest
    container_name: subscription-hub-vault
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN:-admin-token}
      - VAULT_ADDR=http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  vault-init:
    image: hashicorp/vault:latest
    container_name: subscription-hub-vault-init
    profiles: [ "manual" ]
    depends_on:
      - vault
    volumes:
      - ./scripts/vault/init.sh:/init.sh
      - ./scripts/vault/secrets.json:/secrets.json
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-admin-token}
    entrypoint: /bin/sh /init.sh


volumes:
  postgres_data:
  redis_data: